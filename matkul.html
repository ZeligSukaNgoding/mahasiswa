<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Sederhana</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Navbar</a>
    <div class="navbar-nav">
      <a class="nav-link active" href="/">Mahasiswa</a>

    <div class="container mt-5">
    <h2 class="text-center mb-4">Data Mata Kuliah</h2>

    <!-- FORM -->
    <div class="card p-4 mb-4 shadow-sm">
        <form id="formMatkul">
            <div class="row">
                <input type="hidden" id="id">

                <div class="col-md-2 mb-2">
                    <input type="text" id="nama" class="form-control" placeholder="Nama Mata Kuliah" required>
                </div>

                <div class="col-md-2 mb-2">
                    <input type="text" id="kode" class="form-control" placeholder="Kode Mata Kuliah" required>
                </div>

                <div class="col-md-2 mb-2">
                    <input type="text" id="sks" class="form-control" placeholder="SKS Mata Kuliah" required>
                </div>

                <div class="col-md-2 mb-2">
                    <input type="text" id="jadwal" class="form-control" placeholder="Jadwal Mata Kuliah" required>
                </div>
                
                <div class="col-md-2 mb-2">
                    <input type="time" style="width: 100%; height: 100%; "id="jam" name="jam">
                </div>

                <div class="col-md-2 mb-2">
                    <button type="submit" class="btn btn-primary w-100">Simpan</button>
                </div>
            </div>
        </form>
    </div>

    <!-- TABEL -->
    <div class="card p-4 shadow-sm">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nama Mata Kuliah</th>
                    <th>Kode Mata Kuliah</th>
                    <th>SKS</th>
                    <th>Jadwal</th>
                    <th>Jam Mulai</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="tabelBody"></tbody>
        </table>
    </div>
</div>

<script src="./matkul.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
